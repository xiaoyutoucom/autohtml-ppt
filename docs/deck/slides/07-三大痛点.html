<section class="slide" data-title="三大痛点">
      <div class="kicker">Why Harness</div>
      <h2 data-en="Coding with AI — hit these traps?">用 AI 编程，这些坑你踩过吗？</h2>
      <div class="layout-cards" style="--n:3">
        <div class="tile">
          <div class="n" data-en="01 · Scope creep">01 · 改偏</div>
          <h3 data-en="Only wanted styling">只想改样式</h3>
          <p data-en="AI rewrote the entire layout — behavior drifted.">AI <strong class="strong" data-en="rewrote the entire layout">重写整个布局</strong> —— 行为跑偏。</p>
        </div>
        <div class="tile">
          <div class="n" data-en="02 · Forgot constraints">02 · 忘约</div>
          <h3 data-en="Agreed ≤200 lines">约定 ≤200 行</h3>

        </div>
        <div class="tile">

      <div class="story-take" style="margin-top:.75rem;max-width:68rem" data-en="Three behavior traps: scope creep, forgotten constraints, fix spirals. Next slide — subtler ones: phantom reads, memory tampering — prompts alone won&apos;t save you.">行为层三坑：改偏、忘约、越修越乱。下一页还有更隐蔽的：<strong class="strong" data-en="phantom reads, memory tampering">幻读、记忆篡改</strong> —— 单靠提示词救不了。</div>
